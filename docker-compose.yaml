services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mspr502_api_flask
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./api/src:/app

  ml_dev:
    build:
      context: ./dev/app
      dockerfile: Dockerfile
    container_name: mspr502_ml_dev
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ./dev/app/src:/app
    environment:
      - SPARK_HOME=/opt/spark-3.4.4-bin-hadoop3
      - PATH=$SPARK_HOME/bin:$PATH
      - PYTHONPATH=/app

  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: mspr501_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mspr501
      POSTGRES_USER: mspr501
      POSTGRES_PASSWORD: s5t4v5
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mspr501"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data