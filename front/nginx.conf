server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  location = /index.html {
    # Cache désactivé pour le HTML principal
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|json|txt)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public";
  }
}
